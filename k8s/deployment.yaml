apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-admin-ui
  namespace: qubership-mesh
  labels:
    app.kubernetes.io/name: gateway-admin-ui
    app.kubernetes.io/part-of: qubership-mesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway-admin-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway-admin-ui
    spec:
      serviceAccountName: gateway-admin-ui
      containers:
        - name: gateway-admin-ui
          image: gateway-admin-ui:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: INTERNAL_ADMIN_HOST
              value: internal-gateway-admin
            - name: PRIVATE_ADMIN_HOST
              value: private-gateway-admin
            - name: PUBLIC_ADMIN_HOST
              value: public-gateway-admin
            - name: CP_API_HOST
              value: control-plane
            - name: CP_API_PORT
              value: "8080"
            - name: CACHE_TTL_SECONDS
              value: "5"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-admin-ui
  namespace: qubership-mesh
  labels:
    app.kubernetes.io/name: gateway-admin-ui
spec:
  selector:
    app.kubernetes.io/name: gateway-admin-ui
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-admin-ui
  namespace: qubership-mesh
  labels:
    app.kubernetes.io/name: gateway-admin-ui
spec:
  ingressClassName: nginx
  rules:
    - host: gateway-admin.mahendra.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway-admin-ui
                port:
                  number: 80